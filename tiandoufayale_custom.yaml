# tiandoufayale's Clash Configuration Template
# Use this link in your Subconverter 'Remote Config'

Proxy_first: &Proxy_first {type: select, proxies: [🚀 节点选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇲🇾 亚洲节点, 🇪🇺 欧洲节点, ♻️ 自动选择, 🔯 故障转移, 🎯 全球直连]}
Direct_first: &Direct_first {type: select, proxies: [🎯 全球直连, ♻️ 自动选择]}
Include_all: &Include_all {type: select, proxies: [🚀 节点选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇲🇾 亚洲节点, 🇪🇺 欧洲节点, ♻️ 自动选择, 🔯 故障转移, 🎯 全球直连], include-all: true, exclude-filter: "(?i)(DIRECT|直连)"}
Urltest_Base: &Urltest_Base {
  type: url-test, 
  include-all: true, 
  url: "https://www.gstatic.com/generate_204", 
  interval: 300, 
  tolerance: 50, 
  max-failed-times: 1, 
  hidden: true
}
# 外部机场通用配置锚点 
PProviders: &PProviders {type: http, interval: 86400, health-check: {enable: true, url: 'https://www.gstatic.com/generate_204', interval: 300}, filter: '^(?!.*(拒绝 | 直连 | 群 | 邀请 | 返利 | 循环 | 官网 | 客服 | 网站 | 网址 | 获取 | 订阅 | 流量 | 到期 | 机场 | 下次 | 版本 | 官址 | 备用 | 过期 | 已用 | 联系 | 邮箱 | 工单 | 贩卖 | 通知 | 倒卖 | 防止 | 国内 | 地址 | 频道 | 无法 | 说明 | 提示 | 特别 | 访问 | 支持 | 教程 | 关注 | 更新 | 作者 | 加入 |USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|traffic))'}

proxy-providers:
  Airport_01:
    <<: *PProviders
    proxy: "🚀 节点选择"
    override:
      additional-prefix: '[机场 1]'
      skip-cert-verify: true

# 全局配置
mixed-port: 7890 
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
profile:
  store-selected: true
  store-fake-ip: true  
dns:
  enable: true
  listen: 127.0.0.1:1053
  cache-algorithm: arc
  ipv6: true
  prefer-h3: false 
  respect-rules: true
  use-hosts: true 
  use-system-hosts: false 
  enhanced-mode: fake-ip  
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter-mode: blacklist
    - "rule-set:fakeip_filter_domain,private_domain,cn_domain"
    - +.lan
    - +.local
    - +.arpa
    - +.internal
    - +.localhost
    - +.market.xiaomi.com
    - time.*.com
    - ntp.*.com
    - +.stun.*.* 
  default-nameserver:
    - 223.5.5.5
# 代理服务器域名的解析，必须走国内 DNS 确保能连上节点
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    "geosite:geolocation-!cn":
      - "https://dns.google/dns-query#🚀 节点选择"
      - "https://cloudflare-dns.com/dns-query#🚀 节点选择"
    "geosite:cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
# 策略组
proxy-groups:
  - {name: 🚀 节点选择, type: select,no-resolve: true,proxies: [♻️ 自动选择, 🔯 故障转移, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇲🇾 亚洲节点, 🇪🇺 欧洲节点, 🚀 手动切换, 🎯 全球直连], icon: "https://pub-8feead0908f649a8b94397f152fb9cba.r2.dev/select.png"}
  - {name: 📲 电报消息, <<: *Proxy_first, icon: "https://pub-8feead0908f649a8b94397f152fb9cba.r2.dev/telegram.png"}
  - {name: 💬 Ai平台, type: select, proxies: [🇭🇰 香港节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇲🇾 亚洲节点, 🇪🇺 欧洲节点, 🚀 手动切换], icon: "https://pub-8feead0908f649a8b94397f152fb9cba.r2.dev/ai.png"}
  - {name: Google, type: select, proxies: [🇭🇰 香港节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇲🇾 亚洲节点, 🇪🇺 欧洲节点, 🚀 手动切换]}
  - {name: 🎯 全球直连, type: select, proxies: [DIRECT, ♻️ 自动选择], icon: "https://pub-8feead0908f649a8b94397f152fb9cba.r2.dev/direct.png"}
  - {name: 🐟 漏网之鱼, <<: *Proxy_first, icon: "https://pub-8feead0908f649a8b94397f152fb9cba.r2.dev/final.png"}
  - {name: 🚀 手动切换, type: select, include-all: true}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, interval: 300, tolerance: 50}
  - {name: 🇭🇰 香港节点, <<: *Urltest_Base, include-all: true, filter: "(?i)(港|HK|hk|Hong Kong|🇭🇰)", icon: "https://pub-8feead0908f649a8b94397f152fb9cba.r2.dev/Hongkong.png"}
  - {name: 🇯🇵 日本节点, <<: *Urltest_Base, include-all: true, filter: "(?i)(日本|🇯🇵|JP|Japan)", icon: "https://pub-8feead0908f649a8b94397f152fb9cba.r2.dev/Japan.png"}
  - {name: 🇺🇲 美国节点, <<: *Urltest_Base, include-all: true, filter: "(?i)(美国|美|🇺🇲|🇺🇸|US|America|United States)", icon: "https://pub-8feead0908f649a8b94397f152fb9cba.r2.dev/America.png"}
  - {name: 🇲🇾 亚洲节点, <<: *Urltest_Base, include-all: true, filter: "(?i)(马来|泰国|越南|VN|KR|Korea|KOR|首尔|韩|台|🇹🇼|TW|Taiwan|新|🇸🇬|SG|Singapore)"}
  - {name: 🇪🇺 欧洲节点, <<: *Urltest_Base, include-all: true, filter: "(?i)(英国|德国|卢森堡|法国|俄罗斯|France|Deutschland|United Kingdom|Italy|Netherland)"}
  - {name: 🛑 广告拦截, type: select, proxies: [REJECT, DIRECT], icon: "https://pub-8feead0908f649a8b94397f152fb9cba.r2.dev/block.png"}
rules:
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT 
  - RULE-SET,banAd_domain,🛑 广告拦截
  # 🟡 2. 局域网与私有网络 (防止内网 IP 和域名发生 DNS 泄露)
  - RULE-SET,private_domain,🎯 全球直连

  # 🟢 3. 国内特色服务特判 (极其重要：国内直连特例，必须在广义规则之前！)
  - RULE-SET,steamcdn_domain,🎯 全球直连    # 保证 Steam 下载走国内 CDN
  - RULE-SET,microsoft_cn_domain,🎯 全球直连 # 保证微软国内服务不绕路
  - RULE-SET,games_cn_domain,🎯 全球直连
  - RULE-SET,socialmedia-cn,🎯 全球直连
  - RULE-SET,ai_cn_domain,🎯 全球直连

  # 🔵 4. 具体应用/网站分流 (明确需要代理或特殊处理的服务)
  - RULE-SET,ai_domain,💬 Ai平台
  - RULE-SET,openai_domain,💬 Ai平台
  - RULE-SET,youtube_domain,🚀 节点选择
  - RULE-SET,github_domain,🚀 节点选择
  - RULE-SET,telegram_domain,🚀 节点选择
  - RULE-SET,google,Google
  - RULE-SET,steam_domain,🚀 节点选择
  - RULE-SET,Cloudflare_domain,🚀 节点选择
  - DOMAIN-SUFFIX,services.googleapis.cn,🚀 节点选择
  - DOMAIN-SUFFIX,xn--ngstr-lra8j.com,🚀 节点选择
  # 🟣 5. 大范围通用域名分流 (CN 必须在前，Proxy 和 GFW 在后，防止误判)
  - RULE-SET,cn_domain,🎯 全球直连
  - RULE-SET,direct_domain,🎯 全球直连
  - RULE-SET,proxy_domain,🚀 节点选择
  - RULE-SET,gfw_domain,🚀 节点选择
  - RULE-SET,tld_proxy,🚀 节点选择
  
  # 🟤 6. IP 规则（全部带 no-resolve，必须放在所有域名规则之后）
  # 这样做的目的是：如果前面的域名规则都没命中，才进行一次 DNS 解析来获取 IP，然后匹配这里的 IP 规则，大幅节省解析开销。
  - RULE-SET,telegram_ip,📲 电报消息,no-resolve
  - RULE-SET,twitter_ip,🚀 节点选择,no-resolve
  - RULE-SET,private_ip,🎯 全球直连,no-resolve
  - RULE-SET,cn_ip,🎯 全球直连,no-resolve
  - RULE-SET,steamcdn_ip,🎯 全球直连,no-resolve
  
  # ⚫ 7. 兜底与 Geo 数据 (作为 Rule-Set 未命中的最后补充)
  - GEOSITE,private,🎯 全球直连
  - GEOSITE,steam,🚀 节点选择
  - GEOSITE,CN,🎯 全球直连
  - GEOIP,CN,🎯 全球直连,no-resolve
  - GEOIP,private,🎯 全球直连,no-resolve
  - GEOIP,telegram,🚀 节点选择,no-resolve
  - GEOIP,twitter,🚀 节点选择,no-resolve
  - GEOIP,google,🚀 节点选择,no-resolve
  - MATCH,🐟 漏网之鱼

# 规则集定义
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}

